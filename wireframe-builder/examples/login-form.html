<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wire: {
              bg: 'hsl(0 0% 100%)',
              surface: 'hsl(0 0% 96%)',
              border: 'hsl(0 0% 88%)',
              muted: 'hsl(0 0% 62%)',
              text: 'hsl(0 0% 26%)',
              dark: 'hsl(0 0% 13%)',
            }
          },
          borderRadius: {
            wire: '0.375rem',
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      body {
        @apply bg-wire-bg text-wire-text;
        font-family: system-ui, -apple-system, sans-serif;
      }
    }
  </style>
</head>
<body class="min-h-screen bg-wire-surface">

  <!-- ========== LOGIN PAGE ========== -->
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="flex justify-center mb-8">
        <div class="flex items-center gap-2">
          <div class="w-10 h-10 bg-wire-dark rounded-wire"></div>
          <span class="text-xl font-semibold text-wire-dark">Brand</span>
        </div>
      </div>

      <!-- Login Card -->
      <div class="bg-wire-bg border border-wire-border rounded-wire p-8 shadow-sm">
        <div class="text-center mb-6">
          <h1 class="text-2xl font-semibold text-wire-dark">Welcome back</h1>
          <p class="text-wire-muted mt-2">Sign in to your account to continue</p>
        </div>

        <!-- Form -->
        <form class="space-y-4">
          <!-- Email -->
          <div class="space-y-2">
            <label class="text-sm font-medium text-wire-dark">Email</label>
            <input type="email" placeholder="you@example.com"
              class="w-full px-4 py-3 border border-wire-border rounded-wire bg-wire-bg text-wire-text placeholder:text-wire-muted focus:outline-none focus:border-wire-muted transition-colors">
          </div>

          <!-- Password -->
          <div class="space-y-2">
            <div class="flex items-center justify-between">
              <label class="text-sm font-medium text-wire-dark">Password</label>
              <a href="#" class="text-sm text-wire-muted hover:text-wire-text transition-colors">Forgot password?</a>
            </div>
            <input type="password" placeholder="••••••••"
              class="w-full px-4 py-3 border border-wire-border rounded-wire bg-wire-bg text-wire-text placeholder:text-wire-muted focus:outline-none focus:border-wire-muted transition-colors">
          </div>

          <!-- Remember me -->
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 border border-wire-border rounded accent-wire-dark">
            <span class="text-sm text-wire-text">Remember me for 30 days</span>
          </label>

          <!-- Submit button -->
          <button type="submit" class="w-full px-4 py-3 bg-wire-dark text-white rounded-wire hover:bg-wire-text transition-colors font-medium">
            Sign in
          </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-wire-border"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-wire-bg text-wire-muted">Or continue with</span>
          </div>
        </div>

        <!-- Social logins -->
        <div class="grid grid-cols-2 gap-3">
          <button class="flex items-center justify-center gap-2 px-4 py-3 border border-wire-border rounded-wire hover:bg-wire-surface transition-colors">
            <svg class="w-5 h-5 text-wire-muted" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span class="text-sm text-wire-text">Google</span>
          </button>
          <button class="flex items-center justify-center gap-2 px-4 py-3 border border-wire-border rounded-wire hover:bg-wire-surface transition-colors">
            <svg class="w-5 h-5 text-wire-muted" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            <span class="text-sm text-wire-text">GitHub</span>
          </button>
        </div>

        <!-- Sign up link -->
        <p class="text-center text-sm text-wire-muted mt-6">
          Don't have an account? <a href="#" class="text-wire-text hover:underline">Sign up</a>
        </p>
      </div>

      <!-- Footer -->
      <p class="text-center text-xs text-wire-muted mt-6">
        By signing in, you agree to our <a href="#" class="hover:text-wire-text">Terms</a> and <a href="#" class="hover:text-wire-text">Privacy Policy</a>
      </p>
    </div>
  </div>

</body>
</html>
